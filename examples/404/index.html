<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <!--
    cd examples/404 && presetcss build
    Writes dist/style.css from preset.toml.
  -->
  <link rel="stylesheet" href="dist/style.css">
</head>
<body style="margin: 0; font-family: system-ui, sans-serif;">

  <div class="error-page">

    <!-- Big 404 number -->
    <div class="error-code">404</div>

    <!-- Icon -->
    <div style="font-size: 3.5rem; margin: -1rem 0 1.5rem;">🔍</div>

    <!-- Title & description -->
    <h1 class="error-title">Page not found</h1>
    <p class="text-muted" style="font-size: 0.9375rem; max-width: 420px; line-height: 1.7; margin: 0 0 2.5rem;">
      We looked everywhere but couldn't find what you were looking for.
      The page may have moved, been deleted, or never existed.
    </p>

    <!-- Actions -->
    <div class="flex" style="gap: 0.875rem; flex-wrap: wrap; justify-content: center;">
      <a href="../landing-page/index.html" class="btn-home">
        ← Go to homepage
      </a>
      <a href="#" class="btn-back" onclick="history.back(); return false;">
        Go back
      </a>
    </div>

    <!-- Helpful links -->
    <div class="bg-white border" style="border-radius: 0.625rem; padding: 1.5rem 2rem; margin-top: 3rem; max-width: 400px; width: 100%; text-align: left;">
      <p class="font-bold text-dark" style="font-size: 0.85rem; margin: 0 0 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b;">Helpful links</p>
      <div style="display: flex; flex-direction: column; gap: 0.375rem;">
        <a href="../landing-page/index.html" class="text-primary" style="text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.375rem;">
          <span>→</span> Landing page
        </a>
        <a href="../dashboard/index.html" class="text-primary" style="text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.375rem;">
          <span>→</span> Dashboard example
        </a>
        <a href="../docs/index.html" class="text-primary" style="text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.375rem;">
          <span>→</span> Documentation
        </a>
        <a href="https://github.com/BaseMax/PresetCSS" class="text-primary" style="text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.375rem;">
          <span>→</span> GitHub repository
        </a>
      </div>
    </div>

    <!-- PresetCSS credit -->
    <p class="text-muted" style="font-size: 0.8rem; margin-top: 3rem;">
      Styled with <a href="../landing-page/index.html" class="text-primary" style="text-decoration: none; font-weight: 600;">PresetCSS</a>
    </p>

  </div>

</body>
</html>
