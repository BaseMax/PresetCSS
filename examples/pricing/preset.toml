# SaaS pricing page
[options]
output = "dist/style.css"

[colors]
primary       = "#7c3aed"
primary-dark  = "#6d28d9"
primary-light = "#ede9fe"
success       = "#16a34a"
success-light = "#dcfce7"
dark          = "#0f172a"
muted         = "#64748b"
light         = "#fafafa"
white         = "#ffffff"
border        = "#e5e7eb"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors = ["hover"]

[utilities]
container      = "max-width: 1060px; margin: 0 auto; padding: 0 1.5rem;"
pricing-card   = "background: white; border: 1px solid #e5e7eb; border-radius: 1rem; padding: 2rem; display: flex; flex-direction: column;"
pricing-popular = "background: #7c3aed; border-color: #7c3aed; border-radius: 1rem; padding: 2rem; display: flex; flex-direction: column; position: relative;"
feature-item   = "display: flex; align-items: center; gap: 0.625rem; font-size: 0.875rem; padding: 0.375rem 0;"
btn-plan       = "display: block; text-align: center; padding: 0.75rem 1.5rem; border-radius: 0.625rem; font-weight: 600; text-decoration: none; margin-top: auto; cursor: pointer;"
toggle-pill    = "display: inline-flex; align-items: center; background: #f3f4f6; border-radius: 9999px; padding: 0.25rem;"
