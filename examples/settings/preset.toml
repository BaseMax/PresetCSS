# User settings / profile page
[options]
output = "dist/style.css"

[colors]
primary       = "#3b82f6"
primary-light = "#dbeafe"
dark          = "#0f172a"
muted         = "#64748b"
surface       = "#f8fafc"
white         = "#ffffff"
danger        = "#dc2626"
danger-light  = "#fee2e2"
border        = "#e2e8f0"
success       = "#16a34a"

[breakpoints]
md = "768px"
lg = "1024px"

[utilities]
container      = "max-width: 960px; margin: 0 auto; padding: 0 1.5rem;"
settings-wrap  = "display: flex; gap: 2rem; padding: 2.5rem 0; min-height: calc(100vh - 4rem);"
settings-nav   = "width: 14rem; flex-shrink: 0;"
settings-main  = "flex: 1;"
nav-link       = "display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.875rem; border-radius: 0.5rem; text-decoration: none; font-size: 0.875rem; color: #64748b; margin-bottom: 0.125rem;"
nav-link-active = "display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.875rem; border-radius: 0.5rem; text-decoration: none; font-size: 0.875rem; font-weight: 600; color: #3b82f6; background: #dbeafe; margin-bottom: 0.125rem;"
settings-card  = "background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1.75rem; margin-bottom: 1.5rem;"
form-row       = "display: flex; flex-direction: column; gap: 0.375rem; margin-bottom: 1.25rem;"
form-input     = "padding: 0.625rem 0.875rem; border: 1.5px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; outline: none; color: #0f172a;"
btn-save       = "padding: 0.625rem 1.25rem; background: #3b82f6; color: white; border: none; border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem; cursor: pointer;"
danger-zone    = "background: #fff5f5; border: 1px solid #fca5a5; border-radius: 0.75rem; padding: 1.75rem;"
toggle         = "position: relative; display: inline-block; width: 2.75rem; height: 1.5rem; flex-shrink: 0;"
