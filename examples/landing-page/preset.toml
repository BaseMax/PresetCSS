# PresetCSS - landing page example preset
[options]
output = "dist/style.css"

[colors]
primary       = "#3b82f6"
primary-dark  = "#1d4ed8"
primary-light = "#dbeafe"
white         = "#ffffff"
dark          = "#0f172a"
muted         = "#334155"
gray          = "#64748b"
gray-light    = "#f1f5f9"
light         = "#f8fafc"
green         = "#16a34a"
green-light   = "#dcfce7"

[extend.text]
"3xl" = "1.875rem"
"4xl" = "2.25rem"

[extend.spacing]
"14" = "3.5rem"
"20" = "5rem"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors  = ["hover", "focus"]
static  = ["responsive"]

[utilities]
container   = "max-width: 1100px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem;"
badge       = "display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;"
btn-primary = "display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.625rem 1.25rem; background-color: #3b82f6; color: #ffffff; border-radius: 0.5rem; font-weight: 600; text-decoration: none; border: 2px solid #3b82f6; cursor: pointer;"
btn-outline = "display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.625rem 1.25rem; background-color: transparent; color: #3b82f6; border-radius: 0.5rem; font-weight: 600; text-decoration: none; border: 2px solid #3b82f6; cursor: pointer;"
card        = "background: #ffffff; border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);"
code-block  = "background: #1e293b; border-radius: 0.5rem; padding: 1.5rem; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.8rem; line-height: 1.75; overflow-x: auto; color: #e2e8f0;"
grid-3      = "display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;"
grid-2      = "display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem;"
