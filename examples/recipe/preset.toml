# Recipe / cooking article page
[options]
output = "dist/style.css"

[colors]
primary       = "#ea580c"
primary-dark  = "#c2410c"
primary-light = "#ffedd5"
dark          = "#1c1917"
muted         = "#78716c"
surface       = "#fafaf9"
white         = "#ffffff"
success       = "#16a34a"
success-light = "#dcfce7"
border        = "#e7e5e4"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors = ["hover"]

[utilities]
container      = "max-width: 760px; margin: 0 auto; padding: 0 1.5rem;"
recipe-header  = "border-bottom: 1px solid #e7e5e4; padding-bottom: 2rem; margin-bottom: 2rem;"
time-badge     = "display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.35rem 0.75rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 600; background: #ffedd5; color: #ea580c;"
nutrient-grid  = "display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; background: #f5f5f4; border-radius: 0.75rem; padding: 1.25rem; margin: 1.5rem 0;"
nutrient-item  = "text-align: center;"
step-item      = "display: flex; gap: 1rem; margin-bottom: 1.75rem;"
step-num       = "width: 2rem; height: 2rem; border-radius: 9999px; background: #ea580c; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; flex-shrink: 0; margin-top: 0.125rem;"
ingredient-row = "display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0; border-bottom: 1px solid #f5f5f4;"
tip-box        = "background: #fff7ed; border: 1px solid #fed7aa; border-radius: 0.625rem; padding: 1rem 1.25rem; margin: 1.5rem 0;"
