# Documentation site
[options]
output = "dist/style.css"

[colors]
primary      = "#0284c7"
primary-dark = "#0369a1"
primary-light = "#e0f2fe"
ink          = "#0f172a"
muted        = "#64748b"
surface      = "#f8fafc"
white        = "#ffffff"
tip          = "#10b981"
tip-light    = "#d1fae5"
warning      = "#f59e0b"
warning-light = "#fef3c7"
danger       = "#ef4444"
danger-light = "#fee2e2"
border       = "#e2e8f0"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors = ["hover"]

[utilities]
docs-layout   = "display: flex; min-height: 100vh;"
docs-sidebar  = "width: 16rem; flex-shrink: 0; border-right: 1px solid #e2e8f0; background: #f8fafc; padding: 1.5rem 0; overflow-y: auto; position: sticky; top: 0; height: 100vh;"
docs-content  = "flex: 1; padding: 2.5rem 3rem; max-width: 860px; overflow-y: auto;"
callout-tip   = "display: flex; gap: 0.75rem; background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 0.5rem; padding: 1rem 1.25rem; margin: 1.5rem 0;"
callout-warn  = "display: flex; gap: 0.75rem; background: #fef3c7; border: 1px solid #fcd34d; border-radius: 0.5rem; padding: 1rem 1.25rem; margin: 1.5rem 0;"
callout-danger = "display: flex; gap: 0.75rem; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 0.5rem; padding: 1rem 1.25rem; margin: 1.5rem 0;"
code-block    = "background: #0f172a; border-radius: 0.5rem; padding: 1.25rem 1.5rem; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.8rem; line-height: 1.75; overflow-x: auto; color: #e2e8f0; margin: 1rem 0;"
nav-item      = "display: flex; align-items: center; padding: 0.375rem 1.25rem; font-size: 0.875rem; text-decoration: none; color: #64748b; border-radius: 0;"
nav-active    = "display: flex; align-items: center; padding: 0.375rem 1.25rem; font-size: 0.875rem; text-decoration: none; color: #0284c7; font-weight: 600; background: #e0f2fe; border-right: 2px solid #0284c7;"
