# Shopping cart & checkout flow
[options]
output = "dist/style.css"

[colors]
primary       = "#059669"
primary-dark  = "#047857"
primary-light = "#d1fae5"
dark          = "#111827"
muted         = "#6b7280"
surface       = "#f9fafb"
white         = "#ffffff"
danger        = "#dc2626"
danger-light  = "#fee2e2"
border        = "#e5e7eb"

[breakpoints]
md = "768px"
lg = "1024px"

[utilities]
container    = "max-width: 1060px; margin: 0 auto; padding: 0 1.5rem;"
checkout-wrap = "display: grid; grid-template-columns: 1fr 380px; gap: 2rem; padding: 2rem 0; align-items: start;"
form-section = "background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.75rem; margin-bottom: 1.25rem;"
form-row     = "display: flex; gap: 1rem; margin-bottom: 1rem;"
form-group   = "display: flex; flex-direction: column; gap: 0.375rem; flex: 1;"
form-input   = "padding: 0.625rem 0.875rem; border: 1.5px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.875rem; color: #111827; outline: none;"
order-summary = "background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1.5rem; position: sticky; top: 1.5rem;"
cart-item    = "display: flex; gap: 0.875rem; padding: 0.875rem 0; border-bottom: 1px solid #f3f4f6;"
submit-btn   = "display: block; width: 100%; padding: 0.875rem; background: #059669; color: white; border: none; border-radius: 0.625rem; font-weight: 700; font-size: 1rem; cursor: pointer; text-align: center; margin-top: 1.25rem;"
