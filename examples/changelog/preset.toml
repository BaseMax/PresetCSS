# Changelog / release history page
[options]
output = "dist/style.css"

[colors]
primary      = "#8b5cf6"
primary-light = "#ede9fe"
success      = "#10b981"
success-light = "#d1fae5"
warning      = "#f59e0b"
warning-light = "#fef3c7"
danger       = "#ef4444"
danger-light = "#fee2e2"
info         = "#0ea5e9"
info-light   = "#e0f2fe"
dark         = "#111827"
muted        = "#6b7280"
light        = "#fafaf9"
white        = "#ffffff"
border       = "#e5e7eb"

[breakpoints]
md = "768px"

[utilities]
container     = "max-width: 760px; margin: 0 auto; padding: 0 1.5rem;"
entry         = "display: flex; gap: 2rem; margin-bottom: 3rem;"
entry-date    = "flex-shrink: 0; width: 7rem; text-align: right; padding-top: 0.125rem;"
entry-body    = "flex: 1; border-left: 2px solid #e5e7eb; padding-left: 2rem; position: relative;"
version-badge = "display: inline-flex; align-items: center; padding: 0.2rem 0.625rem; border-radius: 0.375rem; font-size: 0.75rem; font-weight: 700; font-family: monospace;"
change-type   = "display: inline-flex; align-items: center; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;"
