# PresetCSS - dashboard example preset
[options]
output = "dist/style.css"

[colors]
primary       = "#3b82f6"
primary-light = "#dbeafe"
success       = "#16a34a"
success-light = "#dcfce7"
warning       = "#d97706"
warning-light = "#fef3c7"
danger        = "#dc2626"
danger-light  = "#fee2e2"
white         = "#ffffff"
dark          = "#0f172a"
sidebar       = "#1e293b"
muted         = "#475569"
gray          = "#64748b"
border        = "#e2e8f0"
light         = "#f8fafc"

[extend.spacing]
"72" = "18rem"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors  = ["hover", "focus"]
static  = ["responsive"]

[utilities]
sidebar-nav  = "width: 240px; min-height: 100vh; background: #1e293b; padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0;"
nav-item     = "display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 0.375rem; color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500; cursor: pointer;"
nav-active   = "display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.75rem; border-radius: 0.375rem; background: #3b82f6; color: #ffffff; text-decoration: none; font-size: 0.875rem; font-weight: 500; cursor: pointer;"
card         = "background: #ffffff; border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);"
stat-card    = "background: #ffffff; border-radius: 0.5rem; padding: 1.25rem 1.5rem; box-shadow: 0 1px 2px rgb(0 0 0 / 0.05); display: flex; align-items: flex-start; justify-content: space-between;"
badge        = "display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600;"
avatar       = "width: 2.25rem; height: 2.25rem; border-radius: 9999px; background: #3b82f6; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 0.8rem; flex-shrink: 0;"
grid-4       = "display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem;"
grid-2       = "display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;"
table-row    = "display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr; align-items: center; padding: 0.875rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem;"
