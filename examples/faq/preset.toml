# FAQ page
[options]
output = "dist/style.css"

[colors]
primary       = "#0ea5e9"
primary-dark  = "#0284c7"
primary-light = "#e0f2fe"
dark          = "#0f172a"
muted         = "#64748b"
surface       = "#f0f9ff"
white         = "#ffffff"
border        = "#e2e8f0"

[breakpoints]
md = "768px"

[variants]
colors = ["hover"]

[utilities]
container   = "max-width: 720px; margin: 0 auto; padding: 0 1.5rem;"
faq-item    = "background: white; border: 1px solid #e2e8f0; border-radius: 0.625rem; overflow: hidden; margin-bottom: 0.75rem;"
faq-q       = "display: flex; align-items: center; justify-content: space-between; padding: 1.125rem 1.5rem; cursor: pointer; font-weight: 600; font-size: 0.95rem; color: #0f172a;"
faq-a       = "padding: 0 1.5rem 1.25rem; font-size: 0.9rem; line-height: 1.75; color: #64748b; border-top: 1px solid #f1f5f9;"
category-btn = "display: inline-flex; align-items: center; padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; border: 1.5px solid transparent; cursor: pointer;"
