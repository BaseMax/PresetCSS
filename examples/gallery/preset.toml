# Photo gallery / media grid
[options]
output = "dist/style.css"

[colors]
primary      = "#ec4899"
primary-dark = "#db2777"
primary-light = "#fce7f3"
dark         = "#0f172a"
muted        = "#64748b"
surface      = "#fdf2f8"
white        = "#ffffff"
border       = "#e2e8f0"

[breakpoints]
md  = "768px"
lg  = "1024px"
xl  = "1280px"

[variants]
colors = ["hover"]

[utilities]
container    = "max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;"
gallery-grid = "display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.875rem;"
gallery-item = "border-radius: 0.625rem; overflow: hidden; position: relative; aspect-ratio: 1; cursor: pointer; background: #f1f5f9;"
img-placeholder = "width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: transform 0.2s;"
overlay      = "position: absolute; inset: 0; background: rgba(15,23,42,0.55); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.375rem; opacity: 0; transition: opacity 0.2s;"
photo-caption = "font-size: 0.75rem; font-weight: 600; color: white; text-align: center; padding: 0 0.75rem;"
filter-bar   = "display: flex; align-items: center; gap: 0.625rem; flex-wrap: wrap; margin-bottom: 1.5rem;"
filter-btn   = "padding: 0.375rem 0.875rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 500; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; color: #64748b;"
