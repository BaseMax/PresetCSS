# Team / about us page
[options]
output = "dist/style.css"

[colors]
primary       = "#3b82f6"
primary-light = "#dbeafe"
dark          = "#0f172a"
muted         = "#64748b"
surface       = "#f8fafc"
white         = "#ffffff"
border        = "#e2e8f0"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors = ["hover"]

[utilities]
container  = "max-width: 1060px; margin: 0 auto; padding: 0 1.5rem;"
team-card  = "background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; overflow: hidden; text-align: center;"
member-img = "width: 5rem; height: 5rem; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; margin: 0 auto 0.875rem;"
social-row = "display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-top: 0.75rem;"
social-btn = "display: flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 0.375rem; background: #f8fafc; color: #64748b; text-decoration: none; font-size: 0.85rem; border: 1px solid #e2e8f0;"
dept-badge = "display: inline-flex; align-items: center; padding: 0.2rem 0.625rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600;"
value-card = "background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 1.5rem;"
