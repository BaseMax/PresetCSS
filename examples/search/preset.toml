# Search results page
[options]
output = "dist/style.css"

[colors]
primary       = "#3b82f6"
primary-light = "#dbeafe"
dark          = "#0f172a"
muted         = "#64748b"
surface       = "#f8fafc"
white         = "#ffffff"
border        = "#e2e8f0"
visited       = "#7c3aed"

[breakpoints]
md = "768px"
lg = "1024px"

[variants]
colors = ["hover"]

[utilities]
container     = "max-width: 860px; margin: 0 auto; padding: 0 1.5rem;"
search-header = "background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0; position: sticky; top: 0; z-index: 10;"
search-input  = "display: flex; align-items: center; gap: 0.625rem; border: 1.5px solid #e2e8f0; border-radius: 2rem; padding: 0.625rem 1.25rem; background: white; max-width: 600px;"
result-item   = "padding: 1.25rem 0; border-bottom: 1px solid #f1f5f9;"
result-url    = "display: flex; align-items: center; gap: 0.375rem; font-size: 0.8rem; color: #16a34a; margin-bottom: 0.25rem;"
highlight     = "background: #fef3c7; color: #0f172a; padding: 0 0.15em; border-radius: 2px;"
filter-tab    = "padding: 0.5rem 1rem; border-bottom: 2px solid transparent; font-size: 0.875rem; cursor: pointer; color: #64748b; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap;"
filter-active = "padding: 0.5rem 1rem; border-bottom: 2px solid #3b82f6; font-size: 0.875rem; cursor: pointer; color: #3b82f6; font-weight: 600; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap;"
