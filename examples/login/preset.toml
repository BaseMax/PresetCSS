# Authentication / login form
[options]
output = "dist/style.css"

[colors]
primary       = "#4f46e5"
primary-dark  = "#4338ca"
primary-light = "#e0e7ff"
dark          = "#111827"
muted         = "#6b7280"
light         = "#f9fafb"
white         = "#ffffff"
error         = "#dc2626"
error-light   = "#fee2e2"
success       = "#16a34a"
border        = "#d1d5db"

[breakpoints]
md = "768px"

[utilities]
auth-wrap   = "min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9fafb; padding: 2rem 1rem;"
auth-card   = "background: white; border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgb(0 0 0/0.08);"
form-label  = "display: block; font-size: 0.875rem; font-weight: 600; color: #111827; margin-bottom: 0.375rem;"
form-input  = "display: block; width: 100%; padding: 0.625rem 0.875rem; border: 1.5px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; color: #111827; background: white; outline: none; box-sizing: border-box;"
btn-primary = "display: block; width: 100%; padding: 0.75rem; background: #4f46e5; color: white; border: none; border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem; cursor: pointer; text-align: center;"
btn-google  = "display: flex; align-items: center; justify-content: center; gap: 0.625rem; width: 100%; padding: 0.625rem; border: 1.5px solid #d1d5db; border-radius: 0.5rem; background: white; font-size: 0.875rem; font-weight: 500; cursor: pointer; color: #111827;"
divider     = "display: flex; align-items: center; gap: 0.75rem; color: #9ca3af; font-size: 0.8rem; margin: 1.25rem 0;"
