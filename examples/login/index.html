<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — PresetCSS example</title>
  <!--
    cd examples/login && presetcss build
    Writes dist/style.css from preset.toml.
  -->
  <link rel="stylesheet" href="dist/style.css">
</head>
<body style="margin: 0; font-family: system-ui, sans-serif;">

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Logo -->
      <div class="text-center" style="margin-bottom: 2rem;">
        <div class="bg-primary" style="width: 2.5rem; height: 2.5rem; border-radius: 0.625rem; margin: 0 auto 0.75rem; display: flex; align-items: center; justify-content: center;">
          <span style="color: white; font-weight: 700; font-size: 1rem;">P</span>
        </div>
        <h1 class="font-bold text-dark" style="font-size: 1.375rem; margin: 0 0 0.375rem;">Welcome back</h1>
        <p class="text-muted" style="font-size: 0.875rem; margin: 0;">Sign in to your PresetCSS account</p>
      </div>

      <!-- Google sign in -->
      <button class="btn-google" style="margin-bottom: 0.75rem;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="divider">
        <div style="flex: 1; height: 1px; background: #e5e7eb;"></div>
        <span>or</span>
        <div style="flex: 1; height: 1px; background: #e5e7eb;"></div>
      </div>

      <!-- Form -->
      <form onsubmit="return false;" style="display: flex; flex-direction: column; gap: 0;">

        <div style="margin-bottom: 1rem;">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div style="margin-bottom: 0.5rem;">
          <div class="flex items-center justify-between" style="margin-bottom: 0.375rem;">
            <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
            <a href="#" class="text-primary" style="font-size: 0.8rem; text-decoration: none; font-weight: 500;">Forgot password?</a>
          </div>
          <input class="form-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <div class="flex items-center" style="gap: 0.5rem; margin-bottom: 1.5rem;">
          <input type="checkbox" id="remember" style="width: 1rem; height: 1rem; accent-color: #4f46e5; cursor: pointer;">
          <label for="remember" class="text-muted" style="font-size: 0.8rem; cursor: pointer;">Remember me for 30 days</label>
        </div>

        <button type="submit" class="btn-primary">Sign in</button>

      </form>

      <!-- Error state example (hidden by default) -->
      <div style="display: none; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 0.5rem; padding: 0.75rem 1rem; margin-top: 0.75rem; font-size: 0.875rem; color: #dc2626;">
        Invalid email or password. Please try again.
      </div>

      <p class="text-center text-muted" style="font-size: 0.875rem; margin-top: 1.75rem;">
        Don't have an account?
        <a href="#" class="text-primary font-bold" style="text-decoration: none;">Sign up free →</a>
      </p>

      <p class="text-center text-muted" style="font-size: 0.75rem; margin-top: 1.25rem; line-height: 1.6;">
        By signing in you agree to our
        <a href="#" class="text-primary" style="text-decoration: none;">Terms</a> and
        <a href="#" class="text-primary" style="text-decoration: none;">Privacy Policy</a>.
      </p>

    </div>
  </div>

</body>
</html>
