# PresetCSS - default preset.
#
# This file is embedded in the compiler and used as the baseline theme.
# `presetcss init` writes a copy of it so you start from something real.
#
# Rules of the format:
#   * Token groups are FLAT string -> string maps. No nesting, ever.
#   * Writing a group (e.g. [colors]) REPLACES this default group entirely.
#   * To ADD to a default group instead, use [extend.<group>] - your keys win.
#   * Variants are opt-in per group under [variants]. Nothing is implicit.

[options]
output  = "dist/preset.css"
content = []            # e.g. ["src/**/*.{html,jsx,tsx}"] to tree-shake output
minify  = false
base    = "minimal"     # "minimal" reset | "none" | path to your own reset file
prefix  = ""            # e.g. "u-" makes classes .u-bg-primary
source_comments = false # emit /* preset.toml:7 colors.primary */ above each rule
dedup   = true          # merge rules that share an identical declaration block

[colors]
white   = "#ffffff"
black   = "#000000"
gray-50  = "#f8fafc"
gray-100 = "#f1f5f9"
gray-200 = "#e2e8f0"
gray-300 = "#cbd5e1"
gray-500 = "#64748b"
gray-700 = "#334155"
gray-900 = "#0f172a"
primary  = "#3b82f6"

[spacing]
"0"  = "0"
"1"  = "0.25rem"
"2"  = "0.5rem"
"3"  = "0.75rem"
"4"  = "1rem"
"5"  = "1.25rem"
"6"  = "1.5rem"
"8"  = "2rem"
"10" = "2.5rem"
"12" = "3rem"
"16" = "4rem"
auto = "auto"

[sizes]
"0"    = "0"
"4"    = "1rem"
"8"    = "2rem"
"16"   = "4rem"
full   = "100%"
screen = "100vh"
auto   = "auto"

[radius]
none = "0"
sm   = "0.125rem"
md   = "0.375rem"
lg   = "0.5rem"
full = "9999px"

[fonts]
sans = "system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
mono = "ui-monospace, SFMono-Regular, Menlo, monospace"

[text]
sm   = "0.875rem"
base = "1rem"
lg   = "1.125rem"
xl   = "1.25rem"
"2xl" = "1.5rem"

[shadows]
sm = "0 1px 2px 0 rgb(0 0 0 / 0.05)"
md = "0 4px 6px -1px rgb(0 0 0 / 0.1)"
lg = "0 10px 15px -3px rgb(0 0 0 / 0.1)"

[breakpoints]
sm = "640px"
md = "768px"
lg = "1024px"

# Opt-in variants, per group. Pseudo-groups: "static" and "utilities".
# Recognized states: hover, focus, focus-visible, active, disabled, first, last.
# The special value "responsive" enables breakpoint prefixes (sm:, md:, ...).
[variants]
colors  = ["hover", "focus"]
spacing = []
sizes   = []
radius  = []
fonts   = []
text    = []
shadows = []
static  = []
